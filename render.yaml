services:
  - type: web
    name: assessmentweb-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 3000

  - type: static_site
    name: assessmentweb-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    publishDirectory: dist
    envVars:
      - key: VITE_API_URL
        value: http://localhost:5000/api
